<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de contenido neutral</title>
  <desc id="desc">Un repositorio conectado aporta docs y static, que se combinan con una plantilla para producir un site publicado.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="420" rx="28" fill="url(#bg)"/>
  <text x="480" y="58" text-anchor="middle" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Contenido neutral → publicación</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="72" y="128" width="220" height="150" rx="18" fill="url(#card)" opacity="0.96"/>
    <text x="182" y="170" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">Repositorio</text>
    <text x="182" y="204" text-anchor="middle" fill="#334155" font-size="16">docs/*.md</text>
    <text x="182" y="230" text-anchor="middle" fill="#334155" font-size="16">static/img/*</text>
    <path d="M316 203h108" stroke="#93c5fd" stroke-width="8" stroke-linecap="round"/>
    <path d="M424 203l-22-16v32z" fill="#93c5fd"/>
    <rect x="444" y="128" width="220" height="150" rx="18" fill="url(#card)" opacity="0.96"/>
    <text x="554" y="170" text-anchor="middle" fill="#0f172a" font-size="22" font-weight="700">Adaptador</text>
    <text x="554" y="204" text-anchor="middle" fill="#334155" font-size="16">frontmatter</text>
    <text x="554" y="230" text-anchor="middle" fill="#334155" font-size="16">remark-directive</text>
    <path d="M688 203h108" stroke="#93c5fd" stroke-width="8" stroke-linecap="round"/>
    <path d="M796 203l-22-16v32z" fill="#93c5fd"/>
    <rect x="816" y="128" width="72" height="150" rx="18" fill="#bfdbfe" opacity="0.98"/>
    <text x="852" y="190" text-anchor="middle" fill="#0f172a" font-size="18" font-weight="700">Site</text>
    <text x="852" y="218" text-anchor="middle" fill="#334155" font-size="14">HTML</text>
  </g>
</svg>
