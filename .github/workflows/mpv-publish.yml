name: Publish documentation

on:
  workflow_dispatch:
    inputs:
      build_id:
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Build documentation
        uses: ./.github/actions/mpv-publisher
        with:
          build-id: ${{ inputs.build_id }}
          publication-config: .mpv/publication.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mpv-pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
